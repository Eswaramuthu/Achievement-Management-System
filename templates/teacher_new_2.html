<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Registration - AMS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename = 'styles.css') }}" />
    <script src="{{ url_for('static', filename = 'script.js') }}"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            border-radius: var(--glass-radius);
            padding: 3.5rem;
            width: 100%;
            max-width: 800px;
        }

        .form-label {
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
            border-radius: 12px !important;
            padding: 12px 18px !important;
            width: 100%;
            outline: none;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary-color) !important;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .register-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            margin-top: 1rem;
        }
    </style>
</head>

<body class="login-page">
    <div class="toggle-container">
        <button id="mode-toggle" class="theme-toggle">🌙</button>
    </div>

    <div class="glass-card">
        <div class="text-center mb-5">
            <h2 class="title">Faculty Enrollment</h2>
            <p class="text-secondary">Official registration for academic verification</p>
        </div>

        <form action="/teacher-new" method="POST" onsubmit="return validatePasswords(event)">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

            <div class="row">
                <div class="col-md-6 input-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="teacher_name" class="form-control" placeholder="Dr. Smith" required>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Faculty Code</label>
                    <input type="text" name="teacher_id" class="form-control" placeholder="FAC-999" required>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Work Email</label>
                    <input type="email" name="email" class="form-control" placeholder="smith@faculty.edu" required>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Phone</label>
                    <input type="tel" name="phone_number" class="form-control" placeholder="+91..." required>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Secure Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                        required>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Verify Password</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
                    <span id="password-message" style="font-size: 0.8rem;"></span>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Dept</label>
                    <select name="teacher_dept" class="form-select" required>
                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="IT">IT</option>
                    </select>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Authorization Code</label>
                    <input type="password" name="teacher_code" class="form-control" placeholder="Secret Key" required>
                </div>
            </div>

            <button type="submit" class="register-btn">Apply for Access</button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('teacher') }}" class="text-secondary text-decoration-none small">Return to Login</a>
        </div>
    </div>

    <script>
        function validatePasswords(event) {
            const p = document.getElementById('password').value;
            const c = document.getElementById('confirm-password').value;
            if (p !== c) {
                event.preventDefault();
                document.getElementById('password-message').innerHTML = "<span style='color:#ff4d4d'>Mismatch!</span>";
                return false;
            }
            return true;
        }

        // Theme toggle
        const modeToggle = document.getElementById('mode-toggle');
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            modeToggle.innerText = '🌙';
        }

        modeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            modeToggle.innerText = isLight ? '🌙' : '☀️';
        });
    </script>
</body>

</html>

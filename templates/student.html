<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login - Achievement Management System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename = 'styles.css') }}" />
  <script src="{{ url_for('static', filename = 'script.js') }}"></script>
  <style>
    /* ===== Login Page Modern Theme ===== */

    body {
      background: #050816;
      color: #fff;
      overflow-x: hidden;
    }

    /* Background Glow */

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(239, 68, 68, 0.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.15), transparent 30%),
        radial-gradient(circle at center, rgba(255, 255, 255, 0.03), transparent 40%);
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
    }

    /* Container */

    .login-container {
      width: 100%;
      max-width: 480px;
      margin: 80px auto;
      padding: 40px;

      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;

      backdrop-filter: blur(12px);

      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    /* Title */

    .title {
      font-size: 34px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 35px;
      letter-spacing: -1px;
    }

    /* Inputs */

    .input-box {
      margin-bottom: 22px;
    }

    .details {
      display: block;
      margin-bottom: 10px;
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 500;
    }

    .input-box input {
      width: 100%;
      height: 56px;
      padding: 0 18px;

      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);

      background: rgba(255, 255, 255, 0.04);
      color: #fff;

      font-size: 15px;
      transition: 0.3s ease;
    }

    .input-box input::placeholder {
      color: #64748b;
    }

    .input-box input:focus {
      outline: none;
      border-color: #ef4444;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.12);
    }

    /* Password Wrapper */

    .password-wrapper {
      position: relative;
    }

    .password-toggle-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 18px;
      cursor: pointer;
    }

    /* Login Button */

    .button input {
      width: 100%;
      height: 56px;

      border: none;
      border-radius: 18px;

      background: linear-gradient(135deg, #ef4444, #dc2626);

      color: #fff;
      font-size: 16px;
      font-weight: 700;

      cursor: pointer;
      transition: 0.35s ease;

      box-shadow: 0 15px 35px rgba(239, 68, 68, 0.25);
    }

    .button input:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(239, 68, 68, 0.35);
    }

    /* Divider */

    .signin-divider {
      text-align: center;
      margin: 28px 0;
      position: relative;
      font-size: 13px;
      color: #94a3b8;
    }

    .signin-divider::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .signin-divider span {
      position: relative;
      padding: 0 14px;
      background: #111827;
    }

    /* Google Button */

    .google-signin-btn {
      width: 100%;
      height: 56px;

      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);

      background: rgba(255, 255, 255, 0.04);
      color: #fff;

      font-size: 15px;
      font-weight: 600;

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;

      cursor: pointer;
      transition: 0.3s ease;
    }

    .google-signin-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }

    .google-signin-btn img {
      width: 20px;
      height: 20px;
    }

    /* Theme Toggle */

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;

      width: 52px;
      height: 52px;

      border: none;
      border-radius: 50%;

      background: rgba(255, 255, 255, 0.08);
      color: #fff;

      font-size: 22px;

      display: flex;
      align-items: center;
      justify-content: center;

      cursor: pointer;

      backdrop-filter: blur(10px);

      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);

      transition: 0.3s ease;
    }

    .theme-toggle:hover {
      background: #ef4444;
      transform: scale(1.08);
    }

    /* Auth Links */

    .auth-links {
      margin-top: 28px;

      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .register-cta {
      color: #ef4444;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    .register-cta:hover {
      text-decoration: underline;
    }

    .back-home {
      color: #94a3b8;
      font-size: 13px;
      text-decoration: none;
    }

    .back-home:hover {
      color: #fff;
    }

    /* Error Message */

    .error-message {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 20px;
      text-align: center;
    }

    /* Responsive */

    @media(max-width:600px) {

      .login-container {
        margin: 40px 16px;
        padding: 28px;
      }

      .title {
        font-size: 28px;
      }

      .theme-toggle {
        width: 46px;
        height: 46px;
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <button id="mode-toggle" class="theme-toggle" title="Toggle theme"></button>

  <div class="container login-container">
    <div class="title">Student Login</div>
    <div class="content">
      <form action="/student" method="post">
        <div class="user-details">
          <div class="input-box full-width">
            <span class="details">Student ID</span>
            <input autocomplete="off" autofocus type="text" name="sname" placeholder="Enter your Student ID" required />
          </div>

          <div class="input-box full-width">
            <span class="details">Password</span>
            <div class="password-wrapper">
              <input autocomplete="off" type="password" name="password" id="student-login-password"
                placeholder="Enter your password" required />
              <button type="button" class="password-toggle-btn" aria-label="Show password"
                data-target="student-login-password">
                👁
              </button>
            </div>
          </div>
        </div>

        {% if error %}
        <div class="error-message" style="color: red; text-align: center; margin-bottom: 15px;">
          {{ error }}
        </div>
        {% endif %}

        <div class="button">
          <input type="submit" value="Login" />
        </div>
      </form>

      <!-- Firebase Google Sign-In Option -->
      <div class="google-signin-container">
        <div class="signin-divider">
          <span>OR</span>
        </div>
        <button type="button" id="firebaseSignInBtn" class="google-signin-btn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          Sign in with Google
        </button>
      </div>

      <div class="auth-links">
        <a class="register-cta" href="{{ url_for('student_new') }}">
          New student? Register here
        </a>

        <a class="back-home" href="{{ url_for('home') }}">
          ← Back to Home
        </a>
      </div>

    </div>
  </div>

  <script>
    /**
     * Firebase Configuration Injection - Student Login Page
     * IMPORTANT: This passes the Firebase config from the server (app.py)
     * loaded from environment variables (.env file)
     */
    window.FIREBASE_CONFIG = {
      apiKey: "{{ firebase_config['apiKey'] }}",
      authDomain: "{{ firebase_config['authDomain'] }}",
      databaseURL: "{{ firebase_config.get('databaseURL', '') }}",
      projectId: "{{ firebase_config['projectId'] }}",
      storageBucket: "{{ firebase_config.get('storageBucket', '') }}",
      messagingSenderId: "{{ firebase_config.get('messagingSenderId', '') }}",
      appId: "{{ firebase_config['appId'] }}",
      measurementId: "{{ firebase_config.get('measurementId', '') }}"
    };
    console.log("✅ Firebase config injected from server");
  </script>

  <!-- Firebase SDK Initialization (ES Module) -->
  <script type="module">
    // Import Firebase initialization module
    import { signInWithGoogle } from "{{ url_for('static', filename='js/firebase-init.js') }}";

    /**
     * Handle Firebase Google Sign-In Button Click
     */
    document.getElementById('firebaseSignInBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('firebaseSignInBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        await signInWithGoogle();
      } catch (error) {
        console.error('❌ Sign-in error:', error);
        alert('Sign-in failed: ' + (error.message || 'Please try again'));
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });

    console.log("✅ Firebase Google Sign-In initialized on Student Login page");
  </script>

  <!-- Password visibility toggle logic  -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const toggleButtons = document.querySelectorAll('.password-toggle-btn');

      toggleButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          const targetId = btn.getAttribute('data-target');
          const input = document.getElementById(targetId);
          if (!input) return;

          const isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
          btn.textContent = isPassword ? '🙈' : '👁';
        });
      });
    });
  </script>
</body>

</html>

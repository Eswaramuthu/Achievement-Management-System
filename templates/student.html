<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login - Achievement Management System</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <script src="{{ url_for('static', filename='script.js') }}" defer></script>

  <style>
    /* =========================================
       Modern Auth Layout Overrides
       ========================================= */

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    .auth-nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 16px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 9999;
      box-sizing: border-box;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-color);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
    }

    .auth-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-color);
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .auth-brand svg {
      width: 28px;
      height: 28px;
      color: var(--primary-color);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-back {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-back:hover {
      color: var(--text-color);
    }

    .auth-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 1100px;
      margin: auto 0;
      padding: 120px 20px 40px 20px;
      box-sizing: border-box;
    }

    .auth-container {
      display: flex;
      width: 100%;
      background: var(--glass-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .auth-sidebar {
      flex: 1;
      padding: 60px 40px;
      border-right: 1px solid var(--border-color);
    }

    .auth-form-section {
      flex: 1.2;
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .auth-header {
      margin-bottom: 2rem;
    }

    .auth-header h1 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }

    .error-message {
      background: rgba(255, 28, 28, 0.1);
      border: 1px solid rgba(255, 28, 28, 0.2);
      color: var(--primary-color);
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 1.5rem;
    }

    .auth-form .form-group {
      margin-bottom: 1.5rem;
    }

    .auth-form label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
    }

    .auth-form input[type="text"],
    .auth-form input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-color);
      font-size: 1rem;
      box-sizing: border-box;
    }

    .auth-form input:focus {
      border-color: var(--primary-color);
      outline: none;
      box-shadow: 0 0 0 4px rgba(255, 28, 28, 0.15);
    }

    .password-toggle-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .password-toggle-btn:hover {
      color: var(--text-color);
    }

    .auth-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--primary-color);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-submit:hover {
      background: var(--primary-hover);
    }

    .auth-footer {
      margin-top: 2rem;
      text-align: center;
    }

    .auth-footer a {
      color: var(--primary-color);
      font-weight: 600;
      text-decoration: none;
    }

    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: var(--glass-bg);
      cursor: pointer;
    }

    @media (max-width: 900px) {
      .auth-container {
        flex-direction: column;
      }

      .auth-sidebar {
        display: none;
      }

      .auth-form-section {
        padding: 40px;
      }
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <div class="auth-nav">
    <a href="{{ url_for('home') }}" class="auth-brand">
      <span>Achievement Management System</span>
    </a>

    <div class="nav-actions">
      <a href="{{ url_for('home') }}" class="nav-back">
        Back to Home
      </a>
      <button id="mode-toggle" class="theme-toggle"></button>
    </div>
  </div>

  <!-- Main -->
  <div class="auth-wrapper">
    <div class="auth-container">

      <!-- Sidebar -->
      <div class="auth-sidebar">
        <div class="auth-quote">
          <p>
            "Track your achievements, monitor your progress,
            and take control of your educational journey."
          </p>
        </div>
      </div>

      <!-- Login Form -->
      <div class="auth-form-section">
        <div class="auth-header">
          <h1>Welcome back, Student</h1>
          <p>Please enter your details to access your dashboard.</p>
        </div>

        {% if error %}
        <div class="error-message">
          {{ error }}
        </div>
        {% endif %}

        <form action="/student" method="post" class="auth-form">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="form-group">
            <label for="sname">Student ID</label>
            <div class="input-wrapper">
              <input
                autocomplete="off"
                autofocus
                type="text"
                name="sname"
                id="sname"
                placeholder="e.g. STU12345"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="student-login-password">Password</label>
            <div class="input-wrapper">
              <input
                autocomplete="off"
                type="password"
                name="password"
                id="student-login-password"
                placeholder="Enter your password"
                required
              />

              <button
                type="button"
                class="password-toggle-btn"
                aria-label="Show password"
                data-target="student-login-password"
              >
                <svg
                  class="eye-icon"
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="auth-options">
            <label class="remember-me">
              <input type="checkbox" name="remember">
              <span>Remember me for 30 days</span>
            </label>
          </div>

          <button type="submit" class="btn-submit">
            Sign in to dashboard
          </button>
        </form>

        <div class="auth-footer">
          New student?
          <a href="{{ url_for('student_new') }}">
            Register here
          </a>
        </div>

      </div>
    </div>
  </div>

  <!-- Password Toggle Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const toggleButtons = document.querySelectorAll('.password-toggle-btn');

      toggleButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          const targetId = btn.getAttribute('data-target');
          const input = document.getElementById(targetId);

          if (!input) return;

          input.type = input.type === 'password' ? 'text' : 'password';
        });
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login - Achievement Management System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1.2rem;
    }

    .google-signin-container {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
    }

    .signin-divider {
      text-align: center;
      margin-bottom: 20px;
      position: relative;
    }

    .signin-divider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--border-color);
      z-index: 0;
    }

    .signin-divider span {
      background: var(--bg-color);
      padding: 0 15px;
      position: relative;
      z-index: 1;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .google-signin-btn {
      width: 100%;
      padding: 12px;
      background: var(--glass-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-color);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }

    .google-signin-btn:hover {
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-2px);
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }
    }
  </style>
  <script>
    (function () {
      const t = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      if (t === "light") document.documentElement.classList.add("light-mode");
    })();
  </script>
</head>

<body class="auth-page">
  <div class="toggle-container">
    <button id="mode-toggle" class="theme-toggle">🌙</button>
  </div>

  <div class="container login-container">
    <h1 class="title">Student Access</h1>

    <form action="{{ url_for('student') }}" method="POST">
      <div class="user-details">
        <div class="input-box full-width">
          <label>Student ID</label>
          <input type="text" name="sname" placeholder="Enter your ID" required autofocus>
        </div>

        <div class="input-box full-width">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" name="password" id="studPass" placeholder="••••••••" required>
            <button type="button" class="password-toggle-btn" data-target="studPass">👁</button>
          </div>
        </div>
      </div>

      {% if error %}
      <div class="alert alert-danger"
        style="margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 14px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); text-align: center;">
        {{ error }}
      </div>
      {% endif %}

      <div class="button mt-3">
        <input type="submit" value="Sign In">
      </div>
    </form>

    <div class="google-signin-container">
      <div class="signin-divider">
        <span>OR CONTINUE WITH</span>
      </div>
      <button type="button" id="firebaseSignInBtn" class="google-signin-btn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18">
        Google Account
      </button>
    </div>

    <div class="auth-links">
      <a href="{{ url_for('student_new') }}" class="register-cta">Don't have an account? Register</a>
      <a href="{{ url_for('home') }}" class="back-home">Back to Home</a>
    </div>
  </div>

  <script>
    // Password toggle
    document.querySelectorAll('.password-toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = document.getElementById(btn.dataset.target);
        if (target) {
          target.type = target.type === 'password' ? 'text' : 'password';
          btn.textContent = target.type === 'password' ? '👁' : '🙈';
        }
      });
    });

    // Firebase Config
    window.FIREBASE_CONFIG = {
      apiKey: "{{ firebase_config['apiKey'] }}",
      authDomain: "{{ firebase_config['authDomain'] }}",
      databaseURL: "{{ firebase_config.get('databaseURL', '') }}",
      projectId: "{{ firebase_config['projectId'] }}",
      storageBucket: "{{ firebase_config.get('storageBucket', '') }}",
      messagingSenderId: "{{ firebase_config.get('messagingSenderId', '') }}",
      appId: "{{ firebase_config['appId'] }}",
      measurementId: "{{ firebase_config.get('measurementId', '') }}"
    };
  </script>

  <script type="module">
    import { signInWithGoogle } from "{{ url_for('static', filename='js/firebase-init.js') }}";

    document.getElementById('firebaseSignInBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('firebaseSignInBtn');
      btn.disabled = true;

      try {
        await signInWithGoogle();
      } catch (error) {
        console.error('❌ Sign-in error:', error);
        alert('Sign-in failed: ' + (error.message || 'Please try again'));
        btn.disabled = false;
      }
    });
  </script>
</body>

</html>

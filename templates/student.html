<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Login - Achievement Management System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename = 'styles.css') }}" />
  <script src="{{ url_for('static', filename = 'script.js') }}" defer></script>
  <style>
    /* ===== Login Page Modern Theme ===== */

    body {
      background: #050816;
      color: #fff;
      overflow-x: hidden;
    }

    /* Background Glow */

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top right, rgba(239, 68, 68, 0.18), transparent 30%),
        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.15), transparent 30%),
        radial-gradient(circle at center, rgba(255, 255, 255, 0.03), transparent 40%);
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: -1;
    }

    /* Container */

    .login-container {
      width: 100%;
      max-width: 480px;
      margin: 80px auto;
      padding: 40px;

      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;

      backdrop-filter: blur(12px);

      box-shadow:
        0 20px 60px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    /* Title */

    .title {
      font-size: 34px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 35px;
      letter-spacing: -1px;
    }

    /* Inputs */

    .input-box {
      margin-bottom: 22px;
    }

    .details {
      display: block;
      margin-bottom: 10px;
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 500;
    }

    .input-box input {
      width: 100%;
      height: 56px;
      padding: 0 18px;

      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);

      background: rgba(255, 255, 255, 0.04);
      color: #fff;

      font-size: 15px;
      transition: 0.3s ease;
    }

    .input-box input::placeholder {
      color: #64748b;
    }

    .input-box input:focus {
      outline: none;
      border-color: #ef4444;
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.12);
    }

    /* Password Wrapper */

    .password-wrapper {
      position: relative;
    }

    .password-toggle-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 18px;
      cursor: pointer;
    }

    /* Login Button */

    .button input {
      width: 100%;
      height: 56px;

      border: none;
      border-radius: 18px;

      background: linear-gradient(135deg, #ef4444, #dc2626);

      color: #fff;
      font-size: 16px;
      font-weight: 700;

      cursor: pointer;
      transition: 0.35s ease;

      box-shadow: 0 15px 35px rgba(239, 68, 68, 0.25);
    }

    .button input:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(239, 68, 68, 0.35);
    }

    /* Divider */

    .signin-divider {
      text-align: center;
      margin: 28px 0;
      position: relative;
      font-size: 13px;
      color: #94a3b8;
    }

    .signin-divider::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 100%;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .signin-divider span {
      position: relative;
      padding: 0 14px;
      background: #111827;
    }

    /* Google Button */

    .google-signin-btn {
      width: 100%;
      height: 56px;

      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);

      background: rgba(255, 255, 255, 0.04);
      color: #fff;

      font-size: 15px;
      font-weight: 600;

      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;

      cursor: pointer;
      transition: 0.3s ease;
    }

    .google-signin-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }

    .google-signin-btn img {
      width: 20px;
      height: 20px;
    }

    /* Theme Toggle */

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;

      width: 52px;
      height: 52px;

      border: none;
      border-radius: 50%;

      background: rgba(255, 255, 255, 0.08);
      color: #fff;

      font-size: 22px;

      display: flex;
      align-items: center;
      justify-content: center;

      cursor: pointer;

      backdrop-filter: blur(10px);

      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);

      transition: 0.3s ease;
    }

    .theme-toggle:hover {
      background: #ef4444;
      transform: scale(1.08);
    }

    /* Auth Links */

    .auth-links {
      margin-top: 28px;

      display: flex;
      align-items: center;
      gap: 12px;
    }

    .register-cta {
      color: #ef4444;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }

    .forgot-password:hover {
      opacity: 0.8;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(255, 28, 28, 0.2);
    }

    .btn-submit:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(255, 28, 28, 0.3);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .back-home {
      color: #94a3b8;
      font-size: 13px;
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .back-home:hover {
      color: #fff;
    }

    /* Error Message */

    .error-message {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.25);
      color: #fca5a5;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 20px;
      text-align: center;
    }

    /* Responsive */

    @media(max-width:600px) {

      .login-container {
        margin: 40px 16px;
        padding: 28px;
      }

      .title {
        font-size: 28px;
      }

      .theme-toggle {
        width: 46px;
        height: 46px;
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <!-- Professional Navbar -->
  <div class="auth-nav">
    <a href="{{ url_for('home') }}" class="auth-brand">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7L12 12L22 7L12 2Z" fill="currentColor" />
        <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
        <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" />
      </svg>
      <span>Achievement Management System</span>
    </a>

          <div class="input-box full-width">
            <span class="details">Password</span>
            <div class="password-wrapper">
              <input autocomplete="off" type="password" name="password" id="student-login-password"
                placeholder="Enter your password" required />
              <button type="button" class="password-toggle-btn" aria-label="Show password"
                data-target="student-login-password">
                👁
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Panel (Login Form) -->
      <div class="auth-form-section">
        <div class="auth-header">
          <h1>Welcome back, Student</h1>
          <p>Please enter your details to access your dashboard.</p>
        </div>

        {% if error %}
        <div class="error-message">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          {{ error }}
        </div>
        {% endif %}

        <form action="/student" method="post" class="auth-form">
          <div class="form-group">
            <label for="sname">Student ID</label>
            <div class="input-wrapper">
              <input autocomplete="off" autofocus type="text" name="sname" id="sname" placeholder="e.g. STU12345"
                required />
            </div>
          </div>

          <div class="form-group">
            <label for="student-login-password">Password</label>
            <div class="input-wrapper">
              <input autocomplete="off" type="password" name="password" id="student-login-password"
                placeholder="Enter your password" required />
              <button type="button" class="password-toggle-btn" aria-label="Show password"
                data-target="student-login-password">
                <svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="auth-options">
            <label class="remember-me">
              <input type="checkbox" name="remember">
              <span>Remember me for 30 days</span>
            </label>
          </div>

          <button type="submit" class="btn-submit">Sign in to dashboard</button>
        </form>

        <!-- Firebase Google Sign-In Option -->
        <div class="signin-divider">
          <span>OR</span>
        </div>
        <button type="button" id="firebaseSignInBtn" class="google-signin-btn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          Sign in with Google
        </button>

        <div class="auth-footer">
          New student? <a href="{{ url_for('student_new') }}">Register here</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    /**
     * Firebase Configuration Injection - Student Login Page
     * IMPORTANT: This passes the Firebase config from the server (app.py)
     * loaded from environment variables (.env file)
     */
    window.FIREBASE_CONFIG = {
      apiKey: "{{ firebase_config['apiKey'] }}",
      authDomain: "{{ firebase_config['authDomain'] }}",
      databaseURL: "{{ firebase_config.get('databaseURL', '') }}",
      projectId: "{{ firebase_config['projectId'] }}",
      storageBucket: "{{ firebase_config.get('storageBucket', '') }}",
      messagingSenderId: "{{ firebase_config.get('messagingSenderId', '') }}",
      appId: "{{ firebase_config['appId'] }}",
      measurementId: "{{ firebase_config.get('measurementId', '') }}"
    };
    console.log("✅ Firebase config injected from server");
  </script>

  <!-- Firebase SDK Initialization (ES Module) -->
  <script type="module">
    // Import Firebase initialization module
    import { signInWithGoogle } from "{{ url_for('static', filename='js/firebase-init.js') }}";

    /**
     * Handle Firebase Google Sign-In Button Click
     */
    document.getElementById('firebaseSignInBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('firebaseSignInBtn');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        await signInWithGoogle();
      } catch (error) {
        console.error('❌ Sign-in error:', error);
        alert('Sign-in failed: ' + (error.message || 'Please try again'));
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });

    console.log("✅ Firebase Google Sign-In initialized on Student Login page");
  </script>

  <!-- Password visibility toggle logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const toggleButtons = document.querySelectorAll('.password-toggle-btn');

      const eyeIcon = `<svg class="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
      const eyeOffIcon = `<svg class="eye-off-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;

      toggleButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          const targetId = btn.getAttribute('data-target');
          const input = document.getElementById(targetId);
          if (!input) return;

          const isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          btn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
          btn.innerHTML = isPassword ? eyeOffIcon : eyeIcon;
        });
      });
    });
  </script>
</body>

</html>

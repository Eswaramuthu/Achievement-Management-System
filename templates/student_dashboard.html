<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics - Student Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename = 'styles.css') }}" />
  <script src="{{ url_for('static', filename = 'script.js') }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    (function () {
      const t = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      if (t === "light") document.documentElement.classList.add("light-mode");
    })();
  </script>
  <style>
    body {
      padding-top: 100px;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border-color);
      border-radius: var(--glass-radius);
      padding: 2.5rem;
      margin-bottom: 2rem;
    }

    .score-display {
      font-size: 4rem;
      font-weight: 800;
      color: var(--primary-color);
      text-shadow: 0 0 20px rgba(212, 0, 0, 0.2);
    }

    .chart-container {
      height: 300px;
      position: relative;
    }

    .stat-mini-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      transition: 0.3s;
    }

    .stat-mini-card:hover {
      background: rgba(255, 255, 255, 0.06);
    }
  </style>
</head>

<body class="dashboard-page">
  <div class="toggle-container">
    <button id="mode-toggle" class="theme-toggle">🌙</button>
  </div>

  <div class="container py-4">
    <header class="d-flex justify-content-between align-items-center mb-5">
      <div>
        <h1 class="title mb-0">Performance Insights</h1>
        <p class="text-secondary small">Deep dive into your academic journey</p>
      </div>
      <div class="d-flex gap-2">
        <a href="{{ url_for('student-dashboard') }}" class="btn btn-outline-secondary rounded-pill">Overview</a>
        <a href="{{ url_for('home') }}" class="btn btn-primary rounded-pill">Logout</a>
      </div>
    </header>

    <div class="row g-4">
      <!-- Main Score -->
      <div class="col-lg-4">
        <div class="glass-card text-center h-100 d-flex flex-column justify-content-center">
          <div class="score-display" id="total-score">0</div>
          <p class="text-secondary fw-bold text-uppercase letter-spacing-1">Activity Quotient</p>
          <div class="mt-4 px-3">
            <div class="progress" style="height: 8px; background: rgba(255,255,255,0.1);">
              <div class="progress-bar bg-primary" style="width: 75%"></div>
            </div>
            <small class="text-secondary d-block mt-2">Top 5% of your department</small>
          </div>
        </div>
      </div>

      <!-- Quick Stats -->
      <div class="col-lg-8">
        <div class="row g-3">
          <div class="col-md-6">
            <div class="stat-mini-card">
              <h5 class="text-secondary small uppercase mb-1">Total Impact</h5>
              <h3 class="mb-0">{{ stats.total_achievements }} Achievements</h3>
            </div>
          </div>
          <div class="col-md-6">
            <div class="stat-mini-card">
              <h5 class="text-secondary small uppercase mb-1">Consistency</h5>
              <h3 class="mb-0">Gold Status</h3>
            </div>
          </div>
          <div class="col-lg-12">
            <div class="glass-card mb-0">
              <h5 class="mb-4">Monthly Momentum</h5>
              <div class="chart-container">
                <canvas id="mainTrends"></canvas>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Charts Row -->
      <div class="col-md-6">
        <div class="glass-card">
          <h5 class="mb-4">Domain Concentration</h5>
          <div class="chart-container">
            <canvas id="domainChart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="glass-card">
          <h5 class="mb-4">Global Standing</h5>
          <div class="chart-container">
            <canvas id="standingChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="raw-data"
    data-domain='{"Hackathons": {{ analytics.hackathon }}, "Coding": {{ analytics.coding }}, "Papers": {{ analytics.papers }}, "Culture": {{ analytics.extracurricular }}}'
    data-rank='{"1st": {{ analytics.first }}, "2nd": {{ analytics.second }}, "3rd": {{ analytics.third }}, "Part.": {{ analytics.participation }}}'
    data-trends="{{ analytics.monthly }}" style="display: none;"></div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const dataNode = document.getElementById('raw-data');
      const domains = JSON.parse(dataNode.dataset.domain);
      const ranks = JSON.parse(dataNode.dataset.rank);
      const trends = JSON.parse(dataNode.dataset.trends.replace(/'/g, '"'));

      const score = (ranks['1st'] * 15) + (ranks['2nd'] * 10) + (ranks['3rd'] * 5) + (ranks['Part.'] * 2);
      document.getElementById('total-score').innerText = score;

      const chartDefaults = {
        color: '#888',
        font: { family: 'Poppins' }
      };
      Object.assign(Chart.defaults, chartDefaults);

      // Domain Chart
      new Chart(document.getElementById('domainChart'), {
        type: 'polarArea',
        data: {
          labels: Object.keys(domains),
          datasets: [{
            data: Object.values(domains),
            backgroundColor: ['rgba(212,0,0,0.6)', 'rgba(54,162,235,0.6)', 'rgba(255,206,86,0.6)', 'rgba(75,192,192,0.6)'],
            borderColor: 'transparent'
          }]
        },
        options: { responsive: true, maintainAspectRatio: false, scales: { r: { display: false } } }
      });

      // Standing Chart
      new Chart(document.getElementById('standingChart'), {
        type: 'bar',
        data: {
          labels: Object.keys(ranks),
          datasets: [{
            label: 'Milestones',
            data: Object.values(ranks),
            backgroundColor: '#d40000',
            borderRadius: 8
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { display: false }, x: { grid: { display: false } } }
        }
      });

      // Trends Chart
      new Chart(document.getElementById('mainTrends'), {
        type: 'line',
        data: {
          labels: ['J', 'F', 'M', 'A', 'M', 'J', 'J', 'A', 'S', 'O', 'N', 'D'],
          datasets: [{
            data: trends,
            borderColor: '#d40000',
            borderWidth: 3,
            tension: 0.4,
            pointRadius: 0,
            fill: true,
            backgroundColor: 'rgba(212,0,0,0.05)'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: { y: { display: false }, x: { grid: { display: false } } }
        }
      });
    });
  </script>
</body>

</html>

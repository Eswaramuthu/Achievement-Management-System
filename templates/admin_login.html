<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Access - Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
    <script>
        (function () {
            const t = localStorage.getItem("theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            if (t === "light") document.documentElement.classList.add("light-mode");
        })();
    </script>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            border-radius: var(--glass-radius);
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .form-label {
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
            border-radius: 12px !important;
            padding: 12px 18px !important;
            width: 100%;
            outline: none;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-color) !important;
            background: rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 0 15px rgba(212, 0, 0, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.1rem;
        }

        .btn-admin {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-admin:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 0, 0, 0.2);
        }

        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid transparent;
        }

        .alert-danger {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
            border-color: #e74c3c;
        }
    </style>
</head>

<body class="login-page">
    <div class="toggle-container">
        <button id="mode-toggle" class="theme-toggle">🌙</button>
    </div>

    <div class="glass-card">
        <div class="text-center mb-4">
            <h2 class="title mb-1">Root Terminal</h2>
            <p class="text-secondary small">Administrative Credentials Required</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('admin_login') }}">
            <div class="mb-3">
                <label class="form-label">System UID</label>
                <input type="text" name="admin_id" class="form-control" placeholder="admin_001" required autofocus>
            </div>

            <div class="mb-4">
                <label class="form-label">Secure Token</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="admin-pass" class="form-control" placeholder="••••••••"
                        required>
                    <button type="button" class="password-toggle" data-target="admin-pass">👁</button>
                </div>
            </div>

            <button type="submit" class="btn-admin">Initialize Session</button>
        </form>

        <div class="text-center mt-4">
            <a href="{{ url_for('home') }}" class="text-secondary text-decoration-none small">Return to Gateway</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        document.querySelectorAll('.password-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = document.getElementById(btn.dataset.target);
                if (target.type === "password") {
                    target.type = "text";
                    btn.textContent = "🙈";
                } else {
                    target.type = "password";
                    btn.textContent = "👁";
                }
            });
        });
    </script>
</body>

</html>

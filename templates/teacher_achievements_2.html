<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entry Portal - Achievement Management System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename = 'styles.css') }}" />
  <script src="{{ url_for('static', filename = 'script.js') }}"></script>
  <style>
    body {
      padding-top: 100px;
      min-height: 100vh;
    }

    .form-container {
      max-width: 900px;
      margin: 0 auto;
    }

    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--border-color);
      border-radius: var(--glass-radius);
      padding: 3rem;
    }

    .form-label {
      color: var(--text-secondary);
      font-weight: 600;
      margin-bottom: 8px;
      display: block;
      font-size: 0.9rem;
    }

    .form-control,
    .form-select {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid var(--border-color) !important;
      color: var(--text-color) !important;
      border-radius: 12px !important;
      padding: 12px 15px !important;
      width: 100%;
      outline: none;
      transition: 0.3s;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--primary-color) !important;
      background: rgba(255, 255, 255, 0.08) !important;
    }

    .section-divider {
      height: 1px;
      background: var(--border-color);
      margin: 2rem 0;
    }

    .dynamic-field {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body class="dashboard-page">
  <div class="toggle-container">
    <button id="mode-toggle" class="theme-toggle">🌙</button>
  </div>

  <div class="container form-container py-4">
    <header class="d-flex justify-content-between align-items-center mb-5">
      <div>
        <h1 class="title mb-0">Record Milestone</h1>
        <p class="text-secondary small">Submit a new academic achievement</p>
      </div>
      <a href="{{ url_for('teacher-dashboard') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Back
      </a>
    </header>

    <div class="glass-card">
      <form method="POST" action="{{ url_for('submit_achievements') }}" enctype="multipart/form-data">
        <div class="row g-4">
          <div class="col-md-6">
            <label class="form-label">Student ID</label>
            <input type="text" name="student_id" class="form-control" placeholder="STU-0000" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Achievement Category</label>
            <select id="achievement-type" name="achievement_type" class="form-select" onchange="toggleFields()"
              required>
              <option value="">Select Type</option>
              <option value="hackathon">Hackathon</option>
              <option value="coding">Coding Competition</option>
              <option value="paper">Paper Presentation</option>
              <option value="conference">Conference</option>
              <option value="symposium">Symposium</option>
            </select>
          </div>

          <div class="col-md-12">
            <div class="section-divider"></div>
          </div>

          <div class="col-md-12">
            <label class="form-label">Event / Activity Name</label>
            <input type="text" name="event_name" class="form-control" placeholder="E.g. Smart India Hackathon" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Date of Accomplishment</label>
            <input type="date" name="achievement_date" class="form-control" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Organizing Body</label>
            <input type="text" name="organizer" class="form-control" placeholder="Institution or Company" required>
          </div>

          <!-- Dynamic Fields -->
          <div class="col-md-6 dynamic-field hackathon-field coding-field">
            <label class="form-label">Technical Stack / Tool</label>
            <input type="text" name="technical_stack" class="form-control" placeholder="E.g. Python, React">
          </div>

          <div class="col-md-6 dynamic-field paper-field">
            <label class="form-label">Journal / Published Site</label>
            <input type="text" name="journal_name" class="form-control" placeholder="IEEE, Springer etc">
          </div>

          <div class="col-md-12">
            <label class="form-label">Official Position / Rank</label>
            <input type="text" name="position" class="form-control" placeholder="E.g. 1st Place / Participation"
              required>
          </div>

          <div class="col-md-12">
            <label class="form-label">Additional Context (Optional)</label>
            <textarea name="achievement_description" class="form-control" rows="3"
              placeholder="Brief details about the project or contribution..."></textarea>
          </div>

          <div class="col-md-12 mt-4">
            <label class="form-label">Evidence Upload (PDF/JPG)</label>
            <div class="p-4 rounded-3 border-dashed"
              style="border: 2px dashed var(--border-color); background: rgba(255,255,255,0.02);">
              <input type="file" name="certificate" class="form-control" accept=".pdf,.jpg,.jpeg,.png">
            </div>
          </div>

          <div class="col-md-12 mt-5">
            <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">Register Achievement</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    function toggleFields() {
      const type = document.getElementById('achievement-type').value;
      document.querySelectorAll('.dynamic-field').forEach(f => f.style.display = 'none');
      if (type) {
        document.querySelectorAll(`.${type}-field`).forEach(f => f.style.display = 'block');
      }
    }

    // Theme toggle
    const modeToggle = document.getElementById('mode-toggle');
    if (localStorage.getItem('theme') === 'light') {
      document.body.classList.add('light-mode');
      modeToggle.innerText = '🌙';
    }

    modeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-mode');
      const isLight = document.body.classList.contains('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      modeToggle.innerText = isLight ? '🌙' : '☀️';
    });
  </script>
</body>

</html>

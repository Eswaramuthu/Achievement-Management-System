<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Login - Achievement Management System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename = 'styles.css') }}" />
  <script src="{{ url_for('static', filename = 'script.js') }}" defer></script>
  <style>
    /* ===== Teacher Login Page Styling ===== */

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top right, rgba(239, 68, 68, 0.15), transparent 30%),
        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.12), transparent 30%),
        linear-gradient(135deg, #050816, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    body.light-mode {
      background:
        radial-gradient(circle at top right, rgba(239, 68, 68, 0.08), transparent 30%),
        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.08), transparent 30%),
        linear-gradient(135deg, #f8fafc, #e2e8f0);
    }

    /* ===== Login Container ===== */

    .login-container {
      width: 100%;
      max-width: 460px;
      padding: 40px 34px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 25px 70px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      position: relative;
      overflow: hidden;
    }

    body.light-mode .login-container {
      background: rgba(255, 255, 255, 0.75);
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
    }

    .login-container::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      background: rgba(239, 68, 68, 0.16);
      border-radius: 50%;
      filter: blur(80px);
      top: -60px;
      right: -60px;
    }

    /* ===== Title ===== */

    .title {
      font-size: 34px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
      color: #fff;
      position: relative;
      z-index: 2;
    }

    body.light-mode .title {
      color: #111827;
    }

    /* ===== Input Fields ===== */

    .user-details {
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 2;
    }

    .input-box {
      width: 100%;
    }

    .details {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      font-weight: 500;
      color: #cbd5e1;
    }

    body.light-mode .details {
      color: #475569;
    }

    .input-box input {
      width: 100%;
      height: 52px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 15px;
      transition: 0.3s ease;
    }

    body.light-mode .input-box input {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.08);
      color: #111827;
    }

    .input-box input:focus {
      outline: none;
      border-color: #ef4444;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.15);
    }

    .input-box input::placeholder {
      color: #94a3b8;
    }

    /* ===== Login Button ===== */

    .button {
      margin-top: 28px;
      position: relative;
      z-index: 2;
    }

    .button input {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.35s ease;
      box-shadow: 0 14px 30px rgba(239, 68, 68, 0.25);
    }

    .button input:hover {
      transform: translateY(-3px);
      background: linear-gradient(135deg, #ff4d4d, #dc2626);
    }

    /* ===== Error Message ===== */

    .error-message {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5 !important;
      font-size: 14px;
    }

    /* ===== Auth Links ===== */

    .auth-links {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    .register-cta {
      color: #ef4444;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: 0.3s ease;
    }

    .register-cta:hover {
      color: #ff6b6b;
    }

    .back-home {
      color: #94a3b8;
      font-size: 13px;
      text-decoration: none;
      transition: 0.3s ease;
    }

    .back-home:hover {
      color: #fff;
    }

    body.light-mode .back-home:hover {
      color: #111827;
    }

    /* ===== Theme Toggle ===== */

    .theme-toggle {
      position: fixed;
      top: 18px;
      right: 22px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.35s ease;
      z-index: 9999;
    }

    body.light-mode .theme-toggle {
      background: rgba(255, 255, 255, 0.8);
      color: #111827;
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    .theme-toggle:hover {
      transform: translateY(-3px) scale(1.05);
      background: rgba(239, 68, 68, 0.15);
    }

    /* ===== Mobile ===== */

    @media(max-width: 600px) {

      body {
        padding: 20px;
      }

      .login-container {
        padding: 34px 24px;
        border-radius: 24px;
      }

      .title {
        font-size: 28px;
      }

      .theme-toggle {
        width: 44px;
        height: 44px;
        top: 14px;
        right: 16px;
      }
    }
  </style>
</head>

<body>
   <button id="mode-toggle" class="theme-toggle" title="Toggle theme">🌙</button>

  <div class="container login-container">
    <div class="title">Teacher Login</div>
    <div class="content">
      <form action="/teacher" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
        <div class="user-details">
          <div class="input-box full-width">
            <span class="details">Teacher ID</span>
            <input type="text" name="tname" placeholder="Enter your Teacher ID" required />
          </div>
          <div class="input-box full-width">
            <span class="details">Password</span>
            <input type="password" name="password" placeholder="Enter your password" required />
          </div>
        </div>

        {% if error %}
        <div class="error-message" style="color: red; text-align: center; margin-bottom: 15px;">
          {{ error }}
        </div>
        {% endif %}

        <div class="button">
          <input type="submit" value="Login" />
        </div>
      </form>

      <div class="auth-links">
        <a class="register-cta" href="{{ url_for('teacher-new') }}">New teacher? Register here</a>
        <a class="back-home" href="{{ url_for('home') }}">← Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var themeToggle = document.getElementById('mode-toggle');
      var body = document.body;
      var savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') body.classList.remove('light-mode');
      else body.classList.add('light-mode');
      themeToggle.addEventListener('click', function () {
        body.classList.toggle('light-mode');
        localStorage.setItem('theme', body.classList.contains('light-mode') ? 'light' : 'dark');
        themeToggle.textContent = body.classList.contains('light-mode') ? '🌙' : '☀️';
      });
      themeToggle.textContent = body.classList.contains('light-mode') ? '🌙' : '☀️';
    });
  </script>
</body>
</html>

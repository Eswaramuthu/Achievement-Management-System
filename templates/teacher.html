<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teacher Login - Achievement Management System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      padding: 40px;
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle-btn {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 1.2rem;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>

<body class="auth-page">
  <div class="toggle-container">
    <button id="mode-toggle" class="theme-toggle">🌙</button>
  </div>

  <div class="container login-container">
    <h1 class="title">Teacher Access</h1>

    <form action="{{ url_for('teacher') }}" method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div class="user-details">
        <div class="input-box full-width">
          <label>Teacher ID</label>
          <input type="text" name="tname" placeholder="Enter your ID" required autofocus>
        </div>

        <div class="input-box full-width">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" name="password" id="teacherPass" placeholder="••••••••" required>
            <button type="button" class="password-toggle-btn" data-target="teacherPass">👁</button>
          </div>
        </div>
      </div>

      {% if error %}
      <div class="alert alert-danger"
        style="margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 14px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); text-align: center;">
        {{ error }}
      </div>
      {% endif %}

      <div class="button mt-3">
        <input type="submit" value="Sign In">
      </div>
    </form>

    <div class="auth-links">
      <a href="{{ url_for('teacher-new') }}" class="register-cta">New teacher? Join our faculty</a>
      <a href="{{ url_for('home') }}" class="back-home">Back to Home</a>
    </div>
  </div>

  <script>
    document.querySelectorAll('.password-toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = document.getElementById(btn.dataset.target);
        if (input.type === "password") {
          input.type = "text";
          btn.textContent = "🙈";
        } else {
          input.type = "password";
          btn.textContent = "👁";
        }
      });
    });

    // Theme logic
    const modeToggle = document.getElementById('mode-toggle');
    const body = document.body;

    if (localStorage.getItem('theme') === 'light') {
      body.classList.add('light-mode');
      modeToggle.innerText = '🌙';
    } else {
      modeToggle.innerText = '☀️';
    }

    modeToggle.addEventListener('click', () => {
      body.classList.toggle('light-mode');
      const isLight = body.classList.contains('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      modeToggle.innerText = isLight ? '🌙' : '☀️';
    });
  </script>
</body>

</html>

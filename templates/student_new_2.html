<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Us - Student Registration</title>
    <link rel="stylesheet" href="{{ url_for('static', filename = 'styles.css') }}" />
    <script src="{{ url_for('static', filename = 'script.js') }}"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--border-color);
            border-radius: var(--glass-radius);
            padding: 3.5rem;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
        }

        .form-label {
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid var(--border-color) !important;
            color: var(--text-color) !important;
            border-radius: 12px !important;
            padding: 12px 18px !important;
            width: 100%;
            outline: none;
            transition: 0.3s;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary-color) !important;
            background: rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 0 15px rgba(212, 0, 0, 0.1);
        }

        .input-group {
            margin-bottom: 1.8rem;
        }

        .register-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 1rem;
        }

        .register-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 0, 0, 0.2);
        }

        #password-message {
            display: block;
            margin-top: 8px;
            font-size: 0.8rem;
        }

        .brand-link {
            text-align: center;
            margin-top: 2rem;
        }

        .brand-link a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .brand-link a:hover {
            color: var(--primary-color);
        }
    </style>
</head>

<body class="login-page">
    <div class="toggle-container">
        <button id="mode-toggle" class="theme-toggle">🌙</button>
    </div>

    <div class="glass-card">
        <div class="text-center mb-5">
            <h2 class="title mb-1">Create Account</h2>
            <p class="text-secondary">Join the academic merit ecosystem</p>
        </div>

        {% if success %}
        <div class="alert alert-success"
            style="background: rgba(46, 204, 113, 0.1); border: 1px solid #2ecc71; color: #2ecc71; padding: 15px; border-radius: 10px; margin-bottom: 25px;">
            {{ success }}
        </div>
        {% endif %}

        {% if error %}
        <div class="alert alert-danger"
            style="background: rgba(231, 76, 60, 0.1); border: 1px solid #e74c3c; color: #e74c3c; padding: 15px; border-radius: 10px; margin-bottom: 25px;">
            {{ error }}
        </div>
        {% endif %}

        <form action="/student_new" method="POST" onsubmit="return validatePasswords(event)">
            <div class="row">
                <div class="col-md-6 input-group">
                    <label class="form-label">Legal Name</label>
                    <input type="text" name="student_name" class="form-control" placeholder="John Doe" required>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Enrollment ID</label>
                    <input type="text" name="student_id" class="form-control" placeholder="STU-12345" required>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Official Email</label>
                    <input type="email" name="email" class="form-control" placeholder="john@university.edu" required>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Contact Number</label>
                    <input type="tel" name="phone_number" class="form-control" placeholder="+91 00000 00000" required>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Access Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                        required>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Verify Password</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
                    <span id="password-message"></span>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Gender Identity</label>
                    <select name="student_gender" class="form-select" required>
                        <option value="" disabled selected>Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="col-md-6 input-group">
                    <label class="form-label">Academic Department</label>
                    <select name="student_dept" class="form-select" required>
                        <option value="" disabled selected>Select</option>
                        <option value="CSE">CSE</option>
                        <option value="ECE">ECE</option>
                        <option value="MECH">Mechanical</option>
                        <option value="CIVIL">Civil</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="register-btn">Establish Account</button>
        </form>

        <div class="brand-link">
            <a href="{{ url_for('student') }}">Already have an account? <span
                    class="text-primary fw-bold">Login</span></a>
        </div>
    </div>

    <script>
        function validatePasswords(event) {
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;
            const msg = document.getElementById('password-message');

            if (pass !== confirm) {
                event.preventDefault();
                msg.textContent = "Passwords do not match";
                msg.style.color = "#e74c3c";
                return false;
            }
            return true;
        }

        // Theme toggle
        const modeToggle = document.getElementById('mode-toggle');
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            modeToggle.innerText = '🌙';
        }

        modeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            modeToggle.innerText = isLight ? '🌙' : '☀️';
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Student Achievements - Achievement Management System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <style>
    .manage-container {
      max-width: 1200px !important;
      margin-top: 80px;
    }

    .table-container {
      overflow-x: auto;
      background: var(--glass-bg);
      border-radius: 15px;
      padding: 0;
      margin-bottom: 30px;
      border: 1px solid var(--border-color);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      color: var(--text-color);
    }

    th {
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      text-align: left;
      font-weight: 600;
      border-bottom: 1px solid var(--border-color);
    }

    td {
      padding: 12px 15px;
      border-bottom: 1px solid var(--border-color);
    }

    .form-control {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-color);
      font-size: 14px;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary-color);
    }

    .action-links {
      display: flex;
      gap: 20px;
      margin-top: 30px;
      justify-content: center;
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 13px;
      border-radius: 6px;
      font-weight: 500;
    }

    .btn-success {
      background-color: #28a745;
      color: white;
    }

    .btn-danger {
      background-color: #dc3545;
      color: white;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }
  </style>
</head>

<body class="dashboard-page">
  <div class="toggle-container">
    <button id="mode-toggle">Dark Mode 🌙</button>
  </div>

  <div class="container manage-container">
    <div class="title">Manage Student Achievements</div>

    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th style="width: 80px;">ID</th>
            <th>Name</th>
            <th>Event</th>
            <th>Type</th>
            <th style="width: 150px;">Date</th>
            <th>Institution</th>
            <th>Award</th>
            <th style="width: 180px;">Actions</th>
          </tr>
        </thead>
        <tbody>
          {% for ach in achievements %}
          <tr>
            <form method="POST" action="{{ url_for('update_achievement', id=ach.id) }}">
              <td><span style="opacity: 0.7;">{{ ach.student_id }}</span></td>
              <td><input type="text" name="student_name" value="{{ ach.student_name }}" class="form-control" required>
              </td>
              <td><input type="text" name="event_name" value="{{ ach.event_name }}" class="form-control" required></td>
              <td><input type="text" name="achievement_type" value="{{ ach.achievement_type }}" class="form-control">
              </td>
              <td><input type="date" name="achievement_date" value="{{ ach.achievement_date }}" class="form-control"
                  required></td>
              <td><input type="text" name="institution" value="{{ ach.institution }}" class="form-control"></td>
              <td><input type="text" name="award" value="{{ ach.award }}" class="form-control"></td>
              <td>
                <div style="display: flex; gap: 8px;">
                  <button type="submit" class="btn btn-success btn-sm">Update</button>
            </form>
            <form method="POST" action="{{ url_for('delete_achievement', id=ach.id) }}" style="display:inline;">
              <button type="submit" class="btn btn-danger btn-sm"
                onclick="return confirm('Are you sure?')">Delete</button>
            </form>
    </div>
    </td>
    </tr>
    {% endfor %}
    </tbody>
    </table>
  </div>

  <div class="action-links">
    <a href="{{ url_for('teacher_achievement_entry') }}" class="btn btn-primary">Add New Achievement</a>
    <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-secondary">Back to Dashboard</a>
  </div>
  </div>

  <script>
    // Theme initialization
    const modeToggle = document.getElementById('mode-toggle');
    const body = document.body;

    if (localStorage.getItem('theme') === 'light') {
      body.classList.add('light-mode');
      modeToggle.innerText = 'Dark Mode 🌙';
    } else {
      modeToggle.innerText = 'Light Mode ☀️';
    }

    modeToggle.addEventListener('click', () => {
      body.classList.toggle('light-mode');
      const isLight = body.classList.contains('light-mode');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      modeToggle.innerText = isLight ? 'Dark Mode 🌙' : 'Light Mode ☀️';
    });
  </script>
</body>

</html>

<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-label="Dashboard preview mockup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1f2e"/>
      <stop offset="1" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1400" height="820" rx="28" fill="url(#bg)"/>

  <!-- Top bar -->
  <rect x="52" y="48" width="1296" height="74" rx="18" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.18"/>
  <circle cx="90" cy="85" r="10" fill="#ff1c1c"/>
  <circle cx="120" cy="85" r="10" fill="#ffd166" fill-opacity="0.95"/>
  <circle cx="150" cy="85" r="10" fill="#06d6a0" fill-opacity="0.95"/>
